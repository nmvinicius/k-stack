# BackendTLSPolicy instrui o NGINX Gateway Fabric a abrir uma conexão
# TLS com o argocd-server, verificando o cert com o CA interno do cluster.
# Precisa estar no mesmo namespace do Service que está sendo protegido.
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: argocd-server-tls
  namespace: argocd
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: argocd-server
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: cluster-internal-ca
    hostname: argocd-server.argocd.svc.cluster.local
