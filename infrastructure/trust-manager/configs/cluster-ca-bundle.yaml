# Distribui o CA cert interno como ConfigMap em todos os namespaces.
# Padrão para adicionar um novo serviço com TLS re-encryption:
#   1. cert-manager cria cert assinado por cluster-internal-issuer
#   2. BackendTLSPolicy no namespace do Service referencia este ConfigMap
#   3. Gateway faz re-encryption transparentemente
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: cluster-internal-ca
spec:
  sources:
    - secret:
        name: cluster-internal-ca
        key: tls.crt
  target:
    configMap:
      key: ca.crt
    namespaceSelector: {}
