---
# Redireciona HTTP → HTTPS para o ArgoCD
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-redirect
  namespace: gateway-api
spec:
  parentRefs:
    - name: http-https-gateway
      namespace: gateway-api
      sectionName: http
  hostnames:
    - argocd.k8s.local
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# Roteia HTTPS → argocd-server (HTTP interno, TLS terminado no gateway)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: gateway-api
spec:
  parentRefs:
    - name: http-https-gateway
      namespace: gateway-api
      sectionName: https
  hostnames:
    - argocd.k8s.local
  rules:
    - backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 443
