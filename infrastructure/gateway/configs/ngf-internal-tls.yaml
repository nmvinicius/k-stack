---
# CA usado pelo NGF para assinar os certs dos NGINX Agents dinamicamente.
# A chave privada desta CA fica no secret agent-tls, lido pelo control plane.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ngf-agent-ca
  namespace: gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  isCA: true
  secretName: agent-tls
  commonName: ngf-agent-ca
  duration: 87600h
  renewBefore: 720h
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    size: 256
---
# Issuer namespace-scoped que usa o CA acima para assinar o server-tls.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ngf-internal-issuer
  namespace: gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ca:
    secretName: agent-tls
---
# Cert do gRPC server do control plane — agents conectam via este nome DNS.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ngf-server-tls
  namespace: gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: server-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: ngf-internal-issuer
    kind: Issuer
  dnsNames:
    - nginx-gateway-fabric.gateway-api.svc.cluster.local
    - nginx-gateway-fabric.gateway-api.svc
    - nginx-gateway-fabric.gateway-api
    - localhost
  privateKey:
    algorithm: ECDSA
    size: 256
