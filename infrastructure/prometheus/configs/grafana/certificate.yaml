apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretName: grafana-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: cluster-internal-issuer
    kind: ClusterIssuer
  dnsNames:
    - prometheus-grafana.monitoring.svc.cluster.local
    - prometheus-grafana.monitoring.svc
    - prometheus-grafana.monitoring
    - prometheus-grafana
    - grafana.k8s.local
  privateKey:
    algorithm: ECDSA
    size: 256
