# Roteia HTTPS → prometheus-grafana (TLS re-encryption via BackendTLSPolicy)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: http-https-gateway
      namespace: gateway-api
      sectionName: https
  hostnames:
    - grafana.k8s.local
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: prometheus-grafana
          namespace: monitoring
          port: 443
