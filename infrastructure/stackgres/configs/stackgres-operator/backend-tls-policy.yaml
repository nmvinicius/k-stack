# BackendTLSPolicy instrui o NGINX Gateway Fabric a abrir uma conexão
# TLS com o stackgres-restapi, verificando o cert com o CA interno do cluster.
# Precisa estar no mesmo namespace do Service que está sendo protegido.
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: stackgres-restapi
  namespace: stackgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: stackgres-restapi
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: cluster-internal-ca
    hostname: stackgres-restapi.stackgres.svc.cluster.local
