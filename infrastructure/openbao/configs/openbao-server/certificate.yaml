apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-server
  namespace: openbao
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: openbao-server-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: cluster-internal-issuer
    kind: ClusterIssuer
  dnsNames:
    # Serviço da API REST (validado pelo BackendTLSPolicy)
    - openbao-restapi.openbao.svc.cluster.local
    - openbao-restapi.openbao.svc
    - openbao-restapi.openbao
    - openbao-restapi
    - openbao.k8s.local
    # Serviço headless e pods individuais para comunicação Raft
    - openbao-internal.openbao.svc.cluster.local
    - openbao-internal.openbao.svc
    - openbao-0.openbao-internal.openbao.svc.cluster.local
    - openbao-1.openbao-internal.openbao.svc.cluster.local
    - openbao-2.openbao-internal.openbao.svc.cluster.local
  privateKey:
    algorithm: ECDSA
    size: 256
