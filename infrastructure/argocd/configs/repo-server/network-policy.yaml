apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-allow-applicationset-to-repo-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: argocd-applicationset-controller
    ports:
    - protocol: TCP
      port: 8081
