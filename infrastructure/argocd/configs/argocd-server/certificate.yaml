apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: argocd-server-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: cluster-internal-issuer
    kind: ClusterIssuer
  dnsNames:
    - argocd-server.argocd.svc.cluster.local
    - argocd-server.argocd.svc
    - argocd-server.argocd
    - argocd-server
    - argocd.k8s.local
  privateKey:
    algorithm: ECDSA
    size: 256
