---
# CA raiz para todos os serviços internos do cluster.
# Padrão: cada serviço (ArgoCD, Keycloak, StackGres...) cria seu cert
# assinado por este ClusterIssuer. O trust-manager distribui o CA cert
# como ConfigMap em todos os namespaces que precisarem.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cluster-internal-ca
  namespace: cert-manager
spec:
  isCA: true
  secretName: cluster-internal-ca
  commonName: cluster-internal-ca
  duration: 87600h # 10 anos
  renewBefore: 720h
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    size: 256
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster-internal-issuer
spec:
  ca:
    secretName: cluster-internal-ca
