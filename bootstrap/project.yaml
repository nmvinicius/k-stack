apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
spec:
  description: "Project to tools de base do cluster (Cert-Manager, Gateway API, etc)"
  destinations:
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  sourceRepos:
    - "https://charts.jetstack.io"
    - "git@github.com:nmvinicius/k-stack.git"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'